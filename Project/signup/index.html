<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="singup.css" />
    <title>Create-Account</title>
  </head>
  <body>
    <!-- <h3>Welcome to the Create Account Page!</h3> -->
    <div class="container">
      <a href="../index.html" class="back-login">
        <i class="fa-solid fa-less-than"></i
      ></a>
      <div class="meta-logo">
        <i class="fa-brands fa-meta"></i>
        <span>Meta</span>
      </div>

      <div class="heading">
        <h2>Get started on Facebook</h2>
        <p>
          Create an account to connect with friends, family and communities of
          people who share your interests.
        </p>
      </div>

      <div class="name">
        <label>Name</label>
        <div class="input-name">
          <input type="text" placeholder="First Name" />
          <input type="text" placeholder="Surname" />
        </div>
      </div>

      <div class="DOB">

        <h2>
          Date of birth <i class="fa-regular fa-circle-question"></i>
        </h2>

       <div class="dob-selects">
        <select name="Day" id="day">
          <option value="" disabled selected>Date</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>

        <select class="month" id="month" >
          <option value="" disabled selected> Month</option>
          <option value="jan">jan</option>
          <option value="feb">feb</option>
          <option value="mar">mar</option>
        </select>

        <select class="year" id="year">
          <option value="" disabled selected>year</option>
          <option value="2000">2000</option>
          <option value="2001">2001</option>
          <option value="2002">2002</option>
        </select>
        </div>
      </div>
      
      <div class="gender">
        <h2> gender <i class="fa-regular fa-circle-question"></i></h2>
        <select>
          <option value="" disabled selected>select your gender</option>
          <option value="" >Male</option>
          <option value="">Female</option>
        </select>
      </div>

      <div class="email">
        <h2>Mobile number or email address</h2>
        <input type="text" name="" id="email" placeholder="Mobile number or email address">
      </div>
    
    </div>


    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    


    <script src="singup.js"></script>
  </body>
</html>
