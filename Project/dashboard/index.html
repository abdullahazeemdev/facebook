<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facebook Dashboard</title>

  <link rel="stylesheet" href="dashbaord.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

  <div class="nav-left">
    <div class="logo"><i class="fa-brands fa-facebook"></i></div>

    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Search Facebook">
    </div>
  </div>

  <div class="nav-center">
    <div class="nav-icon active"><i class="fa-solid fa-house"></i></div>
    <div class="nav-icon"><i class="fa-solid fa-video"></i></div>
    <div class="nav-icon"><i class="fa-solid fa-store"></i></div>
    <div class="nav-icon"><i class="fa-solid fa-users"></i></div>
  </div>

  <div class="nav-right">
    <div class="nav-right-icon"><i class="fa-solid fa-bars"></i></div>
    <div class="nav-right-icon"><i class="fa-brands fa-facebook-messenger"></i></div>
    <div class="nav-right-icon"><i class="fa-solid fa-bell"></i></div>

    <div class="profile" id="profileBtn">
      <img src="/images/download.jfif" id="navProfileImg" alt="profile">
    </div>
  </div>

</nav>

<!-- DROPDOWN (IMPORTANT FOR YOUR JS) -->
<div class="dropdown-menu" id="dropdownMenu">

  <div class="dropdown-profile">
    <img src="/images/download.jfif" id="profileImage">
    <input type="file" id="imageInput" hidden>
    <div>
      <h4 id="dropdownName">Loading...</h4>
      <p>See your profile</p>
    </div>
  </div>
  <hr>
  <button id="darkToggle">🌙</button>
  <div class="dropdown-item logout">   
    <i class="fa-solid fa-right-from-bracket"></i>    
    <span>Logout</span>
  </div>

</div>

<!-- MAIN -->
<main class="main-container">

  <!-- LEFT -->
  <aside class="left-sidebar">

    <div class="sidebar-item">
      <img src="/images/download.jfif" id="slidebar-img">
      <span id="sidebarName">Loading...</span>
    </div>

    <div class="sidebar-item"><i class="fa-solid fa-user-group"></i><span>Friends</span></div>
    <div class="sidebar-item"><i class="fa-solid fa-clock"></i><span>Memories</span></div>
    <div class="sidebar-item"><i class="fa-solid fa-bookmark"></i><span>Saved</span></div>
    <div class="sidebar-item"><i class="fa-solid fa-users"></i><span>Groups</span></div>
    <div class="sidebar-item"><i class="fa-solid fa-video"></i><span>Videos</span></div>

  </aside>

  <!-- CENTER -->
  <section class="feed-section">

    <!-- STORIES -->
    <div class="stories">

  <div class="story-card story-upload" id="openStory">
    <img src="/images/download.jfif">
    <p>Create Story</p>
    <input type="file" id="storyInput" hidden>
  </div>

  <!-- dynamic stories yahan aayengi -->
  <div id="storyList"></div>

    </div>

    <!-- CREATE POST -->
    <div class="create-post">

      <div class="post-top">
        <img src="/images/download.jfif" id="postProfileImg">
        <input type="text" id="postInput" placeholder="What's on your mind?">
      </div>

      <hr>

      <div class="post-options">
        <div class="option"><i class="fa-solid fa-video"></i> Live Video</div>
        <div class="option"><i class="fa-solid fa-image"></i> Photo/Video</div>
      </div>

      <input type="file" id="postImage" accept="image/*">
      <button id="postBtn">Post</button>

    </div>

    <!-- POSTS -->
    <div id="postsContainer"></div>

  </section>

  <!-- RIGHT -->
  <aside class="right-sidebar">

    <h3>Contacts</h3>

    <div class="contact"><img src="https://i.pravatar.cc/150?img=31"><span>Ahmed</span></div>
    <div class="contact"><img src="https://i.pravatar.cc/150?img=45"><span>Hamza</span></div>
    <div class="contact"><img src="https://i.pravatar.cc/150?img=30"><span>Misba</span></div>
    <div class="contact"><img src="https://i.pravatar.cc/150?img=41"><span>Muhib</span></div>

  </aside>

</main>

<script src="app.js"></script>
</body>
</html>
